name: Mixed browser and HTTP scenario
description: Tests browser navigation then makes an API call
base_url: https://example.com

steps:
  - name: Open page
    action: browser.navigate
    url: /
    expect:
      has_text: "Example"

  - name: Check external API
    action: http.get
    url: https://jsonplaceholder.typicode.com/posts/1
    expect:
      status: 200
      json_path: $.id
      json_value: 1
