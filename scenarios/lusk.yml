name: Lusk.bzh validation
description: "Tests: HTTP 200, news section (select Bretagne + articles), search for Brest"
base_url: https://lusk.bzh
schedule: "*/5 * * * *"

steps:
  - name: Homepage HTTP status
    action: http.get
    url: /
    expect:
      status: 200

  - name: Open homepage in browser
    action: browser.navigate
    url: /

  - name: Open Actualités section
    action: browser.click
    selector: "button:has(em.bi-newspaper)"

  - name: Wait for news articles
    action: browser.wait_for
    selector: app-news-article
    timeout: 5000

  - name: Select Bretagne region
    action: browser.evaluate
    script: |
      const selects = document.querySelectorAll('select');
      const target = Array.from(selects).find(s =>
        Array.from(s.options).some(o => o.value === 'Bretagne')
      );
      if (!target) throw new Error('Select with Bretagne option not found');
      target.value = 'Bretagne';
      target.dispatchEvent(new Event('change', { bubbles: true }));

  - name: Type Brest in search
    action: browser.fill
    selector: "#query"
    value: "Brest"

  - name: Click search button
    action: browser.click
    selector: "button:has(i.bi.bi-search)"

  - name: Wait for search results
    action: browser.wait_for
    selector: app-search-result
    timeout: 10000

  - name: Wikipedia link in results
    action: browser.wait_for
    selector: 'a:has-text("Brest - Wikipédia")'
    timeout: 5000
