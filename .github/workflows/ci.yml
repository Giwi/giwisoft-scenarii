name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm install --ignore-scripts
          cd frontend && npm install

      - name: Lint (TypeScript check)
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: cd frontend && npx ng build

      - name: Build backend
        run: npm run build:backend

      - name: Build Docker image (smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: false
          tags: scenarii:ci-${{ github.sha }}

      - name: Smoke test container
        run: |
          docker run -d --name scenarii-test -p 3000:3000 \
            -e TELEGRAM_BOT_TOKEN=test \
            -e MAILGUN_API_KEY=test \
            scenarii:ci-${{ github.sha }}
          sleep 3
          curl -sf http://localhost:3000/api/health || (docker logs scenarii-test && exit 1)
          docker stop scenarii-test
          docker rm scenarii-test

      - name: Vulnerability scan (non-blocking)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scenarii:ci-${{ github.sha }}
          format: table
          exit-code: 1

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
