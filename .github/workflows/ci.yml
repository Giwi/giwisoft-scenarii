name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm install --ignore-scripts
      - run: cd frontend && npm install
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm install --ignore-scripts
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm install --ignore-scripts
      - run: cd frontend && npm install
      - run: cd frontend && npx ng build
      - run: npm run build:backend
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: scenarii:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container (amd64)
        run: |
          mkdir -p /tmp/scenarios
          cat > /tmp/scenarios/smoke.yml <<'EOF'
          name: smoke-test
          base_url: http://localhost:3000
          steps:
            - action: http.get
              path: /api/health
          EOF
          docker run -d --name scenarii-test -p 3000:3000 \
            -v /tmp/scenarios:/scenarios \
            -e TELEGRAM_BOT_TOKEN=test \
            -e MAILGUN_API_KEY=test \
            scenarii:ci-${{ github.sha }}
          sleep 3
          curl -sf http://localhost:3000/api/health || (docker logs scenarii-test && exit 1)
          docker stop scenarii-test
          docker rm scenarii-test

      - name: Vulnerability scan (non-blocking)
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scenarii:ci-${{ github.sha }}
          format: table
          exit-code: 1

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:{1}', steps.image.outputs.name, github.ref_name) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
